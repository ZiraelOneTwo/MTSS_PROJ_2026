name: Integrazione continua (Build, Test, Analisi)

on:
  push:
  pull_request:

jobs:
  build-verify:
    runs-on: ubuntu-latest  # Standard test environment

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup JDK-21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilazione del Progetto
        run: mvn clean compile

      - name: Esecuzione test unitari e generazione copertura
        run: mvn test

      # Trasmette il file XML al server esterno
      - name: Trasmissione a Coveralls
        uses: coverallsapp/github-action@v2
        with:
          repo-token: ${{ secrets.COVERALLS_TOKEN }}
          file: target/site/jacoco/jacoco.xml
          format: jacoco

      # Esegue Checkstyle e impacchetta il JAR. 
      # -DskipTests impedisce a Maven di rieseguire i test già passati al mvn test
      - name: Analisi statica e impacchettamento (jar)
        run: mvn verify -DskipTests
